name: ACMEJS CI/CD Pipeline

on:
  push:
    branches:
      - '**'

  pull_request:
    branches:
      - '**'

jobs:
  test-and-build:
    name: Install, Lint, Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Build Application
        run: npm run build

  docker-build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    needs: test-and-build

    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login To DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker Tag
        id: tag
        run: |
          DATE=$(date +'%Y%m%d-%H%M%S')

          COMMIT_MESSAGE=$(git log -1 --pretty=%s | tr ' ' '-' | tr '[:upper:]' '[:lower:]')

          TAG="${DATE}-${COMMIT_MESSAGE}"

          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/acmejs:${{ steps.tag.outputs.tag }} .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/acmejs:${{ steps.tag.outputs.tag }}